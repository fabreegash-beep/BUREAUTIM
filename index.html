<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري أونلاين</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',Tahoma;}
body{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;margin:0;}
.container{max-width:1200px;margin:auto;}

.admin-panel{background:white;border-radius:20px;padding:20px;display:none;}
.admin-panel.show{display:block;}

button{background:#667eea;color:white;border:none;padding:10px;border-radius:10px;cursor:pointer;margin:5px 0;}
button:hover{opacity:0.9;}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;margin-top:20px;
}

.product-card{background:white;border-radius:15px;overflow:hidden;}
.product-card img{width:100%;height:200px;object-fit:cover;}

.product-info{padding:10px;}

input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}

video{width:100%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleAdmin()">🔐 لوحة الإدارة</button>

<div id="adminPanel" class="admin-panel">

<input id="refInput" placeholder="رفيرونس">
<input id="nameInput" placeholder="اسم">
<input id="typeInput" placeholder="نوع">
<input id="quantityInput" type="number" value="1">
<input id="priceInput" type="number" value="0">

<input type="file" id="imageUpload">

<button onclick="openCamera()">📷 تصوير مباشر</button>
<button onclick="switchCamera()">🔄 تبديل الكاميرا</button>

<video id="camera" style="display:none;" autoplay></video>
<button onclick="takePhoto()" id="captureBtn" style="display:none;">📸 التقاط</button>

<div id="imagePreview"></div>

<button onclick="addProduct()">💾 إضافة / تعديل</button>

</div>

<br>

<input id="searchInput" placeholder="🔍 بحث">
<button onclick="searchProducts()">بحث</button>

<div id="productsGrid" class="products-grid"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "arabic-game-onlin.firebaseapp.com",
databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cameraStream=null;
let capturedImage='';
let useFrontCamera=true;

// تشغيل الكاميرا
function openCamera(){

if(cameraStream){
cameraStream.getTracks().forEach(t=>t.stop());
}

navigator.mediaDevices.getUserMedia({
video:{facingMode:useFrontCamera?"user":"environment"}
})
.then(stream=>{
cameraStream=stream;
camera.srcObject=stream;
camera.style.display='block';
captureBtn.style.display='block';
});
}

// تبديل الكاميرا
function switchCamera(){
useFrontCamera=!useFrontCamera;
openCamera();
}

// التقاط صورة
function takePhoto(){
let canvas=document.createElement('canvas');
canvas.width=camera.videoWidth;
canvas.height=camera.videoHeight;

canvas.getContext('2d').drawImage(camera,0,0);

capturedImage=canvas.toDataURL();
imagePreview.innerHTML=`<img src="${capturedImage}" width="150">`;

cameraStream.getTracks().forEach(t=>t.stop());
camera.style.display='none';
captureBtn.style.display='none';
}

// تحويل صورة
function imageToBase64(file){
return new Promise(r=>{
let reader=new FileReader();
reader.onload=()=>r(reader.result);
reader.readAsDataURL(file);
});
}

// إضافة أو تعديل
async function addProduct(){

let ref=refInput.value.toUpperCase();
let name=nameInput.value;
let type=typeInput.value;
let q=parseInt(quantityInput.value)||0;
let p=parseInt(priceInput.value)||0;

let file=imageUpload.files[0];
let img='';

if(capturedImage) img=capturedImage;
else if(file) img=await imageToBase64(file);
else img='https://picsum.photos/300';

db.ref('products/'+ref).set({
ref,name,type,quantity:q,price:p,image:img
});

alert("تمت العملية");
displayAllProducts();
}

// حذف
function deleteProduct(ref){
if(confirm("هل أنت متأكد من الحذف؟")){
db.ref('products/'+ref).remove();
displayAllProducts();
}
}

// تعديل
function editProduct(ref,name,type,price,quantity){

refInput.value=ref;
nameInput.value=name;
typeInput.value=type;
priceInput.value=price;
quantityInput.value=quantity;

adminPanel.classList.add('show');
window.scrollTo({top:0,behavior:'smooth'});
}

// عرض المنتجات
function displayAllProducts(filter=''){
db.ref('products').once('value').then(snap=>{
let arr=Object.values(snap.val()||{});

if(filter){
filter=filter.toLowerCase();
arr=arr.filter(p=>
p.ref.toLowerCase().includes(filter)||
p.name.toLowerCase().includes(filter)||
p.type.toLowerCase().includes(filter)
);
}

let html='';
arr.forEach(p=>{
html+=`
<div class="product-card">
<img src="${p.image}">
<div class="product-info">
<b>${p.name}</b><br>
${p.type}<br>
💰 ${p.price} دج<br><br>

<button onclick="deleteProduct('${p.ref}')">🗑️ حذف</button>
<button onclick="editProduct('${p.ref}','${p.name}','${p.type}','${p.price}','${p.quantity}')">✏️ تعديل</button>

</div>
</div>`;
});

productsGrid.innerHTML=html;
});
}

// البحث
function searchProducts(){
displayAllProducts(searchInput.value);
}

// إظهار لوحة الإدارة
function toggleAdmin(){
adminPanel.classList.toggle('show');
}

displayAllProducts();

</script>

</body>
</html>
