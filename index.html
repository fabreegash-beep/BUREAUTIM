<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري أونلاين</title>

<style>
* {box-sizing:border-box; font-family: 'Segoe UI', Tahoma;}
body {background: linear-gradient(135deg,#667eea,#764ba2); padding:20px; margin:0;}
.container {max-width:1200px;margin:auto;}
.admin-panel {background:white;border-radius:20px;padding:20px;display:none;}
.admin-panel.show{display:block;}
button {background:#667eea;color:white;border:none;padding:10px;border-radius:10px;cursor:pointer;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px;}
.product-card{background:white;border-radius:15px;overflow:hidden;}
.product-card img{width:100%;height:200px;object-fit:cover;}
.product-info{padding:10px;}
</style>
</head>

<body>

<div class="container">

<button onclick="toggleAdmin()">🔐 لوحة الإدارة</button>

<div id="adminPanel" class="admin-panel">

<input id="refInput" placeholder="رفيرونس"><br><br>
<input id="nameInput" placeholder="اسم"><br><br>
<input id="typeInput" placeholder="نوع"><br><br>
<input id="quantityInput" type="number" value="1"><br><br>
<input id="priceInput" type="number" value="0"><br><br>

<input type="file" id="imageUpload"><br><br>

<button onclick="openCamera()">📷 تصوير مباشر</button>
<video id="camera" style="display:none;width:100%" autoplay></video>
<button onclick="takePhoto()" id="captureBtn" style="display:none;">📸 التقاط</button>

<div id="imagePreview"></div><br>

<button onclick="addProduct()">💾 إضافة</button>

</div>

<br>

<input id="searchInput" placeholder="🔍 بحث">
<button onclick="searchProducts()">بحث</button>

<div id="productsGrid" class="products-grid"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "arabic-game-onlin.firebaseapp.com",
  databaseURL: "https://arabic-game-onlin-default-rtdb.europe-west1.firebasedatabase.app",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cameraStream=null;
let capturedImage='';

function openCamera(){
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
cameraStream=stream;
camera.srcObject=stream;
camera.style.display='block';
captureBtn.style.display='block';
});
}

function takePhoto(){
let canvas=document.createElement('canvas');
canvas.width=camera.videoWidth;
canvas.height=camera.videoHeight;
canvas.getContext('2d').drawImage(camera,0,0);

capturedImage=canvas.toDataURL();
imagePreview.innerHTML=`<img src="${capturedImage}" width="150">`;

cameraStream.getTracks().forEach(t=>t.stop());
camera.style.display='none';
captureBtn.style.display='none';
}

function imageToBase64(file){
return new Promise(r=>{
let reader=new FileReader();
reader.onload=()=>r(reader.result);
reader.readAsDataURL(file);
});
}

async function addProduct(){

let ref=refInput.value.toUpperCase();
let name=nameInput.value;
let type=typeInput.value;
let q=parseInt(quantityInput.value)||0;
let p=parseInt(priceInput.value)||0;

let file=imageUpload.files[0];
let img='';

if(capturedImage) img=capturedImage;
else if(file) img=await imageToBase64(file);
else img='https://picsum.photos/300';

db.ref('products/'+ref).set({ref,name,type,quantity:q,price:p,image:img});

alert("تمت الإضافة");
}

function displayAllProducts(filter=''){
db.ref('products').once('value').then(snap=>{
let arr=Object.values(snap.val()||{});

if(filter){
filter=filter.toLowerCase();
arr=arr.filter(p=>
p.ref.toLowerCase().includes(filter)||
p.name.toLowerCase().includes(filter)||
p.type.toLowerCase().includes(filter)
);
}

let html='';
arr.forEach(p=>{
html+=`
<div class="product-card">
<img src="${p.image}">
<div class="product-info">
${p.name}<br>
${p.type}<br>
${p.price} دج
</div>
</div>`;
});

productsGrid.innerHTML=html;
});
}

function searchProducts(){
displayAllProducts(searchInput.value);
}

function toggleAdmin(){
adminPanel.classList.toggle('show');
}

displayAllProducts();

</script>

</body>
</html>
